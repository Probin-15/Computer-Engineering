<!DOCTYPE html>
<html>
<head>
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <h1>Student Registration Form</h1>
  <form method="post">
    <label for="first_name">First Name:</label>
    <input type="text" id="first_name" name="first_name"><br>
    <br><label for="last_name">Last Name:</label>
    <input type="text" id="last_name" name="last_name"><br>
    <br><label for="contact_number">Contact Number:</label>
    <input type="text" id="contact_number" name="contact_number"><br>
    <br><label for="email_id">Email Id:</label>
    <input type="email" id="email_id" name="email_id"><br>
    <br><label for="city">City:</label>
    <select id="city" name="city">
      <option value="Vadodara">Vadodara</option>
      <option value="Nadiad">Nadiad</option>
      <option value="Surat">Surat</option>
      <option value="Rajkot">Rajkot</option>
    </select><br>
    <br><label for="gender">Gender:</label>
    <select id="gender" name="gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select><br>
    <br><label for="Hobbies">Hobbies:</label>
    <input type="text" id="Hobbies" name="Hobbies"><br>
    <br><label for="pwd">Password:</label>
    <input type="password" id="pwd" name="pwd"><br>
    <br><input type="submit" value="SUBMIT" >
    </form> </body></html>
